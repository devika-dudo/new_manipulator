controller_manager:
  ros__parameters:
    use_sim_time: true
    update_rate: 50  # Hz
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    arm_group_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    hand_controller:
      type: joint_trajectory_controller/JointTrajectoryController
joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50  
arm_group_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - fake_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    use_sim_time: true 
hand_controller:
  ros__parameters:
    action_monitor_rate: 20.0
    allow_stalling: true
    goal_tolerance: 0.01
    stall_timeout: 3.0
    stall_velocity_threshold: 0.001
    joints:  
      - joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_integration_in_goal_trajectories: false
    max_effort: 100.0
    use_sim_time: true  
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
